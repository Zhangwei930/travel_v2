<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>周密出游 · 智能本地出游规划</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800;900&family=Noto+Serif+SC:wght@400;500;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(145deg, #DCE5E1 0%, #E8E1D4 45%, #E5DCC9 75%, #DCE2D8 100%);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  * { scrollbar-width: none; -ms-overflow-style: none; }
  *::-webkit-scrollbar { display: none; }

  .screen-enter { animation: zSlideIn 0.28s cubic-bezier(0.25,0.46,0.45,0.94) both; }
  .screen-back  { animation: zSlideBack 0.25s cubic-bezier(0.25,0.46,0.45,0.94) both; }
  .tab-enter    { animation: zFade 0.2s ease both; }
  @keyframes zSlideIn { from{transform:translateX(28px);opacity:0} to{transform:translateX(0);opacity:1} }
  @keyframes zSlideBack { from{transform:translateX(-18px);opacity:0} to{transform:translateX(0);opacity:1} }
  @keyframes zFade { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="zhoumi-screens.jsx"></script>

<script type="text/babel">
const { useState, useRef } = React;

function App() {
  const [tab, setTab]         = useState('home');
  const [stack, setStack]     = useState([]);
  const [animCls, setAnimCls] = useState('tab-enter');

  const navigate = (screen, params = {}) => {
    if (screen === 'back') {
      setAnimCls('screen-back');
      setStack(s => s.slice(0, -1));
      return;
    }
    const tabs = ['home','scenes','generate','assistant','profile'];
    if (tabs.includes(screen)) {
      setAnimCls('tab-enter');
      setTab(screen);
      setStack([]);
      if (screen === 'scenes' && params.sceneId) setStack([{ screen:'scenes', sceneId: params.sceneId, isTab:true }]);
      return;
    }
    setAnimCls('screen-enter');
    setStack(s => [...s, { screen, ...params }]);
  };

  const current = stack.length > 0 ? stack[stack.length - 1] : { screen: tab };
  const showTabs = stack.length === 0 || (stack.length === 1 && stack[0].isTab);

  const renderScreen = () => {
    const { screen, ...params } = current;
    switch (screen) {
      case 'home':       return <ZHomeScreen navigate={navigate} />;
      case 'scenes':     return <ZScenesScreen navigate={navigate} initialScene={params.sceneId} />;
      case 'generate':   return <ZGenerateScreen navigate={navigate} />;
      case 'assistant':  return <ZAssistantScreen navigate={navigate} />;
      case 'profile':    return <ZProfileScreen navigate={navigate} />;
      case 'result':     return <ZResultScreen navigate={navigate} generated={params.generated} />;
      case 'poiDetail':  return <ZPoiDetailScreen navigate={navigate} poiId={params.poiId} />;
      default:           return <ZHomeScreen navigate={navigate} />;
    }
  };

  return (
    <div style={{
      minHeight: '100vh',
      display: 'flex',
      alignItems: 'center',
      justifyContent: 'center',
      padding: '24px 20px',
      gap: 40,
      fontFamily: "'Noto Sans SC', -apple-system, sans-serif",
      background: 'linear-gradient(145deg, #DCE5E1 0%, #E8E1D4 45%, #E5DCC9 75%, #DCE2D8 100%)',
    }}>
      <IOSDevice width={393} height={852} dark={false}>
        <div style={{
          height: '100%',
          display: 'flex',
          flexDirection: 'column',
          background: '#F5F1EB',
          fontFamily: "'Noto Sans SC', -apple-system, sans-serif",
          overflow: 'hidden',
        }}>
          <div key={current.screen + JSON.stringify(current)} className={animCls}
            style={{ flex: 1, overflowY: 'auto', WebkitOverflowScrolling: 'touch', display: 'flex', flexDirection: 'column' }}>
            <div style={{ flex: 1 }}>{renderScreen()}</div>
          </div>
          {showTabs && <ZTabBar tab={tab} onTab={t => navigate(t)} />}
        </div>
      </IOSDevice>

      {/* Side panel */}
      <div style={{
        width: 270,
        color: '#1A2E2C',
        fontFamily: "'Noto Sans SC', -apple-system, sans-serif",
      }}>
        <div style={{ marginBottom: 22 }}>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, fontWeight: 700, color: '#8B9594', letterSpacing: 2, marginBottom: 6 }}>§ PROTOTYPE · V3</div>
          <div style={{ fontFamily: "'Noto Serif SC', serif", fontSize: 26, fontWeight: 900, color: '#0D4F4A', lineHeight: 1.1 }}>周密出游</div>
          <div style={{ fontSize: 13, color: '#5C6C6A', marginTop: 4, fontWeight: 600 }}>智能本地出游规划系统</div>
          <div style={{ fontSize: 11, color: '#8B9594', marginTop: 6, lineHeight: 1.6 }}>地图 API · Dify · 本地 AI · WebSearch · Obsidian</div>
        </div>

        <div style={{
          background: 'rgba(255,255,255,0.7)',
          backdropFilter: 'blur(12px)',
          borderRadius: 14,
          padding: '14px 16px',
          marginBottom: 12,
          border: '1px solid rgba(255,255,255,0.8)',
        }}>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, fontWeight: 700, color: '#8B9594', letterSpacing: 1.2, marginBottom: 6 }}>§ NOW VIEWING</div>
          <div style={{ fontFamily: "'Noto Serif SC', serif", fontSize: 15, fontWeight: 800, color: '#0D4F4A' }}>
            {{ home:'首页', scenes:'场景索引', generate:'一键生成', assistant:'出游助手', profile:'我的', result:'攻略结果', poiDetail:'地点详情' }[current.screen] || current.screen}
          </div>
        </div>

        <div style={{
          background: 'rgba(255,255,255,0.7)',
          backdropFilter: 'blur(12px)',
          borderRadius: 14,
          padding: '12px 14px',
          marginBottom: 12,
          border: '1px solid rgba(255,255,255,0.8)',
        }}>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, fontWeight: 700, color: '#8B9594', letterSpacing: 1.2, marginBottom: 8 }}>§ 01 · PAGES</div>
          {[
            { id:'home',      no:'01', label:'首页',         sub:'定位 + 推荐 + 场景索引' },
            { id:'scenes',    no:'02', label:'场景索引',     sub:'9 类 · 含钓鱼' },
            { id:'generate',  no:'03', label:'一键生成',     sub:'条件 chips + 6 步工作流' },
            { id:'assistant', no:'04', label:'出游助手',     sub:'聊天式 + 来源标注' },
            { id:'profile',   no:'05', label:'我的',         sub:'探索家·反馈·设置' },
          ].map(p => {
            const on = (tab === p.id && stack.length === 0);
            return (
              <div key={p.id} onClick={() => navigate(p.id)} style={{
                display: 'flex', gap: 8, alignItems: 'flex-start',
                padding: '7px 9px', borderRadius: 9, cursor: 'pointer', marginBottom: 1,
                background: on ? '#0D4F4A14' : 'transparent',
                transition: 'background 0.15s',
              }}>
                <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: on ? '#0D4F4A' : '#8B9594', fontWeight: 700, letterSpacing: 0.5, marginTop: 1, width: 16 }}>{p.no}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontFamily: "'Noto Serif SC', serif", fontSize: 12.5, fontWeight: 700, color: on ? '#0D4F4A' : '#1A2E2C' }}>{p.label}</div>
                  <div style={{ fontSize: 10, color: '#8B9594', marginTop: 1 }}>{p.sub}</div>
                </div>
              </div>
            );
          })}
          <div style={{ borderTop: '1px dashed #E8E2D8', marginTop: 7, paddingTop: 7 }}>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9.5, color: '#8B9594', marginBottom: 5, letterSpacing: 0.8 }}>VIA INTERACTION</div>
            <div style={{ fontSize: 11, color: '#5C6C6A', marginBottom: 4 }}>
              <strong>📄 攻略结果</strong> <span style={{ color: '#8B9594' }}>— 生成完成 / 路线卡片</span>
            </div>
            <div style={{ fontSize: 11, color: '#5C6C6A' }}>
              <strong>📍 地点详情</strong> <span style={{ color: '#8B9594' }}>— 附近推荐 / 站点卡片</span>
            </div>
          </div>
        </div>

        <div style={{
          background: 'rgba(255,255,255,0.7)',
          backdropFilter: 'blur(12px)',
          borderRadius: 14,
          padding: '12px 14px',
          border: '1px solid rgba(255,255,255,0.8)',
        }}>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9.5, fontWeight: 700, color: '#8B9594', letterSpacing: 1.2, marginBottom: 8 }}>§ 02 · HIGHLIGHTS</div>
          {[
            ['新增', '🎣 钓鱼场景 + 装备清单'],
            ['索引', '§ N° · NO.xxx · R-xx 语言'],
            ['源', '所有 AI 内容标注数据来源'],
            ['工作流', '6 步可视化加载'],
          ].map(([k, v], i) => (
            <div key={i} style={{ display: 'flex', gap: 7, marginBottom: 5, alignItems: 'baseline' }}>
              <span style={{ background: '#FF6B35', color: '#fff', fontFamily: "'JetBrains Mono', monospace", fontSize: 9, padding: '1.5px 5px', borderRadius: 3, fontWeight: 700, flexShrink: 0 }}>{k}</span>
              <span style={{ fontSize: 11, color: '#5C6C6A', lineHeight: 1.5 }}>{v}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
